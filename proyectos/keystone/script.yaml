outputs:
  # nombre_para_el_output (parametro de salida):
  #   description: texto descriptivo de lo que es el output, para que el usuario
  #                se entere de lo que es el output, y sepa que valor va a recibir.
  #   value: valor que quiero que me devuelva HEAT al aplicar la plantilla.

  password_del_usuario_manager:
    description: Password aleatorio generado para el usuario manager.
    value: 
      get_attr:
        - password_aleatorio_manager
        - value

  password_del_usuario_operador:
    description: Password aleatorio generado para el usuario operador.
    value: 
      get_attr:
        - password_aleatorio_operador
        - value

  password_del_usuario_monitorizacion:
    description: Password aleatorio generado para el usuario monitorizacion.
    value: 
      get_attr:
        - password_aleatorio_monitorizacion
        - value

  dominio_creado:
    description: ID del dominio creado.
    value:
      get_resource: el_dominio

  proyecto_creado:
    description: ID del proyecto creado.
    value:
      get_resource: el_proyecto

  usuario_manager:
    description: ID del usuario manager.
    value:
      get_resource: el_usuario_manager

  usuario_operador:
    description: ID del usuario operador.
    value:
      get_resource: el_usuario_operador

  usuario_monitorizacion:
    description: ID del usuario monitorizacion.
    value:
      get_resource: el_usuario_monitorizacion

