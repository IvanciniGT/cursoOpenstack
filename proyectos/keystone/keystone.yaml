heat_template_version: 2021-04-06

description: >
  Crea un dominio cliente con proyecto, usuario manager (scope dominio),
  usuario operador (rol member en proyecto) y usuario monitorizacion
  (rol reader en proyecto).

parameters:
  usuario_administrador:
    type: string
    description: Nombre del alumno administrador (ej. alumno15)
  password:
    type: string
    description: Password para todos los usuarios creados
    hidden: true
    default: "Pa$$w0rd"

# -------------------------------------------------------
# Variables derivadas (no son parametros de Heat,
# se calculan con str_replace_prefix no disponible en HOT,
# asi que se expresan directamente con get_param)
# -------------------------------------------------------

resources:

  dominio_cliente:
    type: OS::Keystone::Domain
    properties:
      name:
        str_replace:
          template: dominio-ADMIN-cliente
          params:
            ADMIN: { get_param: usuario_administrador }
      description:
        str_replace:
          template: Dominio del cliente de ADMIN
          params:
            ADMIN: { get_param: usuario_administrador }
      enabled: true

  usuario_manager:
    type: OS::Keystone::User
    properties:
      name:
        str_replace:
          template: ADMIN-manager
          params:
            ADMIN: { get_param: usuario_administrador }
      domain: { get_resource: dominio_cliente }
      password: { get_param: password }
      enabled: true

  rol_manager_en_dominio:
    type: OS::Keystone::RoleAssignment
    properties:
      role: manager
      user: { get_resource: usuario_manager }
      domain: { get_resource: dominio_cliente }

  proyecto_cliente:
    type: OS::Keystone::Project
    properties:
      name:
        str_replace:
          template: proyecto-ADMIN-cliente
          params:
            ADMIN: { get_param: usuario_administrador }
      description:
        str_replace:
          template: Proyecto del cliente de ADMIN
          params:
            ADMIN: { get_param: usuario_administrador }
      domain: { get_resource: dominio_cliente }
      enabled: true

  usuario_operador:
    type: OS::Keystone::User
    properties:
      name:
        str_replace:
          template: ADMIN-operador
          params:
            ADMIN: { get_param: usuario_administrador }
      domain: { get_resource: dominio_cliente }
      password: { get_param: password }
      enabled: true

  usuario_monitorizacion:
    type: OS::Keystone::User
    properties:
      name:
        str_replace:
          template: ADMIN-monitorizacion
          params:
            ADMIN: { get_param: usuario_administrador }
      domain: { get_resource: dominio_cliente }
      password: { get_param: password }
      enabled: true

  rol_member_operador:
    type: OS::Keystone::RoleAssignment
    properties:
      role: member
      user: { get_resource: usuario_operador }
      project: { get_resource: proyecto_cliente }

  rol_reader_monitorizacion:
    type: OS::Keystone::RoleAssignment
    properties:
      role: reader
      user: { get_resource: usuario_monitorizacion }
      project: { get_resource: proyecto_cliente }

outputs:
  dominio_id:
    description: ID del dominio cliente creado
    value: { get_resource: dominio_cliente }
  proyecto_id:
    description: ID del proyecto cliente creado
    value: { get_resource: proyecto_cliente }
  manager:
    description: Usuario manager creado
    value:
      str_replace:
        template: ADMIN-manager
        params:
          ADMIN: { get_param: usuario_administrador }
  operador:
    description: Usuario operador creado
    value:
      str_replace:
        template: ADMIN-operador
        params:
          ADMIN: { get_param: usuario_administrador }
  monitorizacion:
    description: Usuario monitorizacion creado
    value:
      str_replace:
        template: ADMIN-monitorizacion
        params:
          ADMIN: { get_param: usuario_administrador }
