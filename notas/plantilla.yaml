# ESTO ES LA SINTAXIS que YAML ofrece, como alternativa a XML o JSON.
# Ahora bien.
# Cuando un programa decide usar YAML para que le entreguen datos, DEFINE UN ESQUEMA.
# NOTA: Ese concepto no es nuevo... también tengo esquemas XML (XSD) y esquemas JSON (JSON Schema)

# El esquema define qué estructura de datos concreta necesita el programa.
# Me define:
# Las claves que puedo usar (algunas obligatorias, otras opcionales)
# Los valores que pueden tener esas claves (si son números, textos, booleanos...)

# por ejemplo, para el caso de nuestra "persona" el esquema podría ser algo así:
- A primer nivel tienes que poner el nombre de la persona, que es un texto
- Dentro de cada persona, puedes poner las siguientes claves:
   - nombre: texto obligatorio
   - apellidos: lista de textos opcional
   - edad: número opcional
   - casado: booleano obligatorio
   - hijos: 
       lista de mapas opcional, donde cada mapa tiene que tener las claves:
            - nombre: texto obligatorio
            - edad: número obligatorio
# Evidentemente no se escribe con esta sintaxis.. pero a nivel conceptual, esto es lo que el programa espera recibir... y si no se lo das, o se lo das mal, te va a dar un error de sintaxis.
# CADA PROGRAMA DEFINE SU ESQUEMA.
# - Kubernetes, tiene su esquema
# - Ansible, tiene su esquema
# - Docker, tiene su esquema
# - GitHub/Gitlab, tienen su esquema
# - Ubuntu, tiene su esquema
# - HEAT, tiene su esquema
