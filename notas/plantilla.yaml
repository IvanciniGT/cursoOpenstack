# Tenemos muchos más nodos escalares, pero no los vamos a ver hoy:
# - Valores nulos      ~
# - Fechas y horas    2024-06-17T12:00:00Z      Formato ISO 8601
# - Binarios            !!binary SGVsbG8gV29ybGQh       Base64

---

# Nodos de colección. Hay muchos tipos... os cuento 2:
---
# Listas ordenadas
# Es una colección de nodos, en los que el orden importa.
- Item1
- 33
-      True
# En la sintaxis... despues del guión , tiene que haber al menos un espacio en blanco
# Puedo tener datos de distintos tipos, como items de la lista... esto implica que incluso otras listas!
---
- item1
- 33
- false
-
   - subitem1
   - subitem2
   # Para tener una lista que sea un item de otra lista, simplemente la sangramos un poco más (al menos 1 espacio)
   # A yaml le da igual con cuantos espacios sangre las sublistas.. lo único que me exige es que sea consistente en cada nivel
---
- item1
- 33
- false
-  
   - subitem1
      - subitem1
      - subitem3
   - subitem3
               - subitem1
               - subitem3
   # Esto es lo mismo que el ejemplo anterior

# NOTA IMPORTANTE: YAML no usa el concepto de espacio en blanco... Usa el concepto de caracter "VACIO" o "BLANCO":
# Realmente puedo usar espacios o puedo usar tabuladores. PERO OJO
#  Si en una linea tengo 4 espacios y en otra 1 tabulador... aunque a la vista lo vea igual, para YAML no es lo mismo... y me va a dar un error de sintaxis.
# NECESITAMOS un buen editor de texto para no joderla: Bloc de notas, VIM, VI, NANO...No sirve para YAML!
# Yo uso VSCode... y cada tabulador es reemplazado en automatico por espacios en blanco. Cuantos? Lo que yo quiera
---

# Hay una sintaxis alternativa a las listas:
- item1
- 22
- false
---
["item1", 22, false] # Corchetes y comas.     ESTO ES JSON... y además es YAML
# ESTO SOLO ESTA POR COMPATIBILIDAD CON JSON... NO SE USA EN LA PRACTICA
# NO ESTA NADA ACONSEJADA ESTA SINTAXIS:
# - Es difícil de leer para un humano
# - Dónde acabará este archivo? EN UN REPOSITORIO DE GIT!
#   Y GIT(como otros sistemas de control de versiones) identifica cambios a nivel de LINEA.
# Si tengo la lista metida en una única linea, si cambio un item, git me dirá que he cambiado la lista! pero me tocará buscar que leches he cambio dentro a MI!
# Por contra, si tengo cada item en una linea, git me dirá que item concreto he cambiado, y me será mucho más fácil revisar el cambio.
# Solo hay un caso legítimo de uso de esta sintaxis: LISTAS VACIAS
---
[]
---
# Mapas desordenados
# Es una colección CLAVE: VALOR... donde cada dato es identificado por su clave, y el orden no importa.
# En algunos lenguajes de programación se le conoce por: MAPA, DICCIONARIO, OBJETO, ARRAY ASOCIATIVO...
clave1:              valor1
otraclave2:          22
yla3clave:           false
---

# NOTA... los items se consideran desordenados!
clave1:             valor1
clave2:             22
clave3:             false
---
# Es lo mismo que:
clave3:           false
clave1:           valor1
clave2:           22
---
# Para YAML eso es lo mismo
# Puedo tener anidación aquñi también
clave1:            texto
clave2:            22
clave3:            false
clave4:
   subclave1:       subvalor1
   subclave2:       33
   subclave3:       true
clave5:
   - subitem1
   - subitem2
clave6: 
   - subitem1:
                  - subsubitem1
                  - subsubitem2
   - subitem2
# Respetando las mismas reglas de sangrado que en las listas, puedo tener mapas dentro de listas, y listas dentro de mapas... lo que me de la real gana!
---
# Este es el tipo de documento más habitual
# NOTA: Hay una sintaxis alternativa a los mapas, que es la de las llaves y comas... pero no se usa en la práctica, así que ni la voy a mostrar
{clave1: valor1, otraclave2: 22, yla3clave: false} # ESTO ES JSON... y además es YAML
# ESTO SOLO ESTA POR COMPATIBILIDAD CON JSON... NO SE USA EN LA PRACTICA
# NO ESTA NADA ACONSEJADA ESTA SINTAXIS:
# - Es difícil de leer para un humano
# - Dónde acabará este archivo? EN UN REPOSITORIO DE GIT!
#   Y GIT(como otros sistemas de control de versiones) identifica cambios a nivel de LINEA.
# Si tengo el mapa metido en una única linea, si cambio un item, git me dirá que he cambiado el mapa! pero me tocará buscar que leches he cambio dentro a MI!
# Por contra, si tengo cada item en una linea, git me dirá que item concreto he cambiado, y me será mucho más fácil revisar el cambio.

# Solo hay un caso legítimo de uso de esta sintaxis: MAPAS VACIOS
