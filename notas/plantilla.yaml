# YaML  - YAML ain't Markup Language

# Es un lenguaje que ofrece una sintaxis alternativa a JSON o XML.
# Nos sirve para estructurar información:
# - Dar una configuración de un programa
# - Dar una estructura a un documento
# - Crear un script de automatización

# YAML SE USA UN HUEVO!
# Existe una spec, que ahora mismo está en v1.2.... es un puro.
# Tiene muchas cosas que en la práctica usamos poco o nada.

# Hoy en día muchísimos programas usan YAML para entrada de datos:
# - Kubernetes (Archivos de manifiesto. Definir un entorno de producción)
# - Ansible    (Playbooks. Crear scripts de automatización)
# - Docker     (Docker Compose. Definir contenedors)
# - GitHub/Gitlab (Definir pipelines de CI/CD)
# - Ubuntu     (Toda la configuración de red, se hace con YAML: netplan)
# - Las aplicaciones JAVA con Spring... su configuración se hace con YAML
# - Y un largo etcétera...

# Literalmente se ha comido a JSON.
# La sintaxis de JSON es un subconjunto de YAML, así que "todo" JSON es YAML, pero no todo YAML es JSON.

# La sintaxis de YAML está fuertemente inspirada en la sintaxis de Python
---
# En YAML podemos poner comentarios... ALELUYA !
# Los comentarios, con la #... lo que hay detrás del # es un comentario, y no se procesa.
# Puede aparecer a media linea, o al principio de la línea, o al final... donde quieras.
---
# Un archivo YAML puede contener varios documentos.
# En JSON o XML, un archivo solo puede contener un documento.
# --- Son la marca de inicio de documento.
# Los ponemos siempre salvo en el primero.
---
# Un documento YAML es UN NODO
# Y hay 2 tipos de nodos: ESCALARES y COLECCIONES
---
# Nodos escalares: Son valores sencillos, como un número, una cadena de texto, un booleano...
---
# Números
43
---
-3.19
---
.Nan # .NAN .nan = Indefinido
---
-.Inf # .INF .inf = Infinito
---
# Valores lógicos: Verdadero falso:
true # TRUE, True
---
false # FALSE, False
---
# Textos... LO MAS COMPLEJO DE YAML con diferencia!
---
Este "es un 'texto 
escrito 

e\n #YAML
---
"Este \"es un 'texto 
escrito 

e\\n #YAML"
---
'Este "es un ''texto 
escrito 

e\n #YAML'
# El caracter de escape \ solo se interpreta como
# caracter de escape entre comillas dobles
#   \n    Salto de linea
#   \t    Tabulador
#   \r    Retorno de carro
#   \\    Solo una contrabarra
#   \"    "

# Es un poco ocura lo de los textos... Simplemente son muchas reglas

# Cómo lidiamos con esto: SIMPLE:
# La sintaxis recomendada en YAML es siempre SIN COMILLAS
# Solo pondré cominnas (de un tipo u otro) cuando no me quede más remedio:
# Básicamente cuando tenga un #
# O cuando un texto empiece por "" (cosas raras)

# Y otra regla. SOLO SE USA ESTA SINTAXIS cuando tengo textos DE UNA LINEA.

# Porque .. para textos de más de una linea, YAML ofrece otras 2 sintaxis:
---
# Literal
|1+
   Aqui escribo lo que me de la real gana
   Que puede tener caracteres raros:
      " # ' , \ : Y esto se resta tal cual

   Los saltos de linea que ponga.
   No cambia nada
   Lo único que hace yaml al leer (parsear) este texto
   Es descontar el sangrado de la primera linea al resto.


---
# Folded
>
   Escribo mi texto
   Con caracteres raros "'#\:
   
   Saltos de linea.

# YAML coge ese texto, no le cambia ni una coma (igual que literal)
# Salvo los saltos de linea, que se reemplazan por espacios.
# Esto lo usamos mucho, especialmente para comandos
---
> 
   openstack role add 
      --project "$NUEVO_PROYECTO" 
      --user "$USUARIO_MONITORIZACION" 
      reader 2>/dev/null 
         && echo "Se ha asignado: reader a $USUARIO_MONITORIZACION en $NUEVO_PROYECTO" 
         || echo "YA existe: rol reader en $USUARIO_MONITORIZACION"

